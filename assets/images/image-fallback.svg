    <text y="100" font-family="'Manrope', 'Plus Jakarta Sans', sans-serif" font-size="22" font-weight="700" fill="#102A43">Kify Hospital Image Placeholder</text>
    <text y="125" font-family="'Inter', 'Source Sans 3', sans-serif" font-size="14" fill="#627D98">Connecting to secure medical network...</text>
