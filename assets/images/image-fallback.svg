      <stop offset="0%" stop-color="#F5FAFD" />
      <stop offset="100%" stop-color="#EAF5FC" />
    </linearGradient>
  </defs>
  <!-- Border and Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="16" />
  <rect x="10" y="10" width="780" height="580" fill="none" stroke="#D9E7EF" stroke-width="4" stroke-dasharray="10, 10" rx="12" />
  
  <!-- Image Placeholder Graphic -->
