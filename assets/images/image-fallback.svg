    <path d="M-50,20 L-50,-30 C-50,-35 -45,-40 -40,-40 L-20,-40 L-10,-55 L10,-55 L20,-40 L40,-40 C45,-40 50,-35 50,-30 L50,20 C50,25 45,30 40,30 L-40,30 C-45,30 -50,25 -50,20 Z" fill="#627D98" opacity="0.3" />
